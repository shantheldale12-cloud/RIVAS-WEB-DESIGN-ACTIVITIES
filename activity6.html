<!DOCTYPE html>
<html>
<head>
  <title>Login Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .login-container {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: rgba(103, 137, 68, 0.95);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 999;
    }

    .login-marquee {
      position: absolute;
      top: 10px;
      width: 100%;
      color: white;
      font-weight: bold;
    }

    .login-box {
      background: white;
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      color: #678944;
      width: 260px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .login-box h2 {
      color: #678944;
      margin-bottom: 10px;
    }

    .login-box input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      border: 2px solid #678944;
      outline: none;
    }

    .login-box button {
      background: #678944;
      color: white;
      width: 75%;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s ease;
      margin-top: 10px;
    }

    .login-box button:hover {
      background: #4f6f32;
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  
  <div class="login-container" id="loginPage">

    <div class="login-marquee">
      <marquee>
       ACTIVITY 6 : RIVAS, SHANTHEL DALE A. <br>
       BSGD 3-A
      </marquee>
    </div>

    <div class="login-box">
      <h2>Welcome</h2>

      <input type="text" id="username" placeholder="Username">
      <input type="password" id="passcode" placeholder="Passcode">

      <button onclick="login()">Get in trouble</button>

      <div class="message" id="message"></div>
    </div>

  </div>
<script>
    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;
      const msg = document.getElementById("message");
      const loginPage = document.getElementById("loginPage");

    
      if (user === "admin" && pass === "1234") {
        msg.style.color = "white";
        msg.innerHTML = "You are in a great trouble!";

        
        setTimeout(() => {
          loginPage.style.display = "none";
        }, 1500);

      } else {
        msg.style.color = "red";
        msg.innerHTML = "Wrong username or passcode";
      }
    }
  </script>

</body>
</html>
