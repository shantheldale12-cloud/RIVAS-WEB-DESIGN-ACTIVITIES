<!DOCTYPE html>
<html>
<head>
  <title>Buttons Activity</title>
</head>
<body>

<marquee style="color: gray;">ACTIVITY 3 : RIVAS, SHANTHEL DALE A. 
<br> BSGD 3-A </marquee>
<br>
<br>

<button class="uber-btn">Request now</button>
<button class="amazon-btn">Add to Cart</button>
<button class="github-btn">Sign up</button>
<button class="bootstrap-btn">Get started</button>
<button class="bootstrap-outline">Download</button>
<button class="linkedin-btn">Apply on company website</button>
<button class="linkedin-outline">Save</button>


<style>
button {
  cursor: pointer;
  transition: all 0.3s ease;
}



.uber-btn {
  background-color: black;
  color: white;
  padding: 10px;
  border: none;
}
.uber-btn:hover {
  background-color: #333;
  transform: scale(1.05);
}



.amazon-btn {
  background-color: rgb(255, 216, 20);
  color: black;
  padding: 10px 40px;
  border: none;
  border-radius: 20px;
}
.amazon-btn:hover {
  background-color: rgb(240, 200, 0);
  transform: scale(1.05);
}



.github-btn {
  background-color: rgb(46, 164, 79);
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
}
.github-btn:hover {
  background-color: rgb(36, 140, 65);
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}



.bootstrap-btn {
  background-color: rgb(121, 82, 179);
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 3px;
}
.bootstrap-btn:hover {
  background-color: rgb(100, 60, 160);
  transform: translateY(-2px);
}


.bootstrap-outline {
  background-color: white;
  color: rgb(108, 117, 125);
  padding: 10px 20px;
  border: 1px solid rgb(108, 117, 125);
  border-radius: 3px;
}
.bootstrap-outline:hover {
  background-color: rgb(108, 117, 125);
  color: white;
}



.linkedin-btn {
  background-color: rgb(10,102,194);
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
}
.linkedin-btn:hover {
  background-color: rgb(8, 85, 160);
  transform: scale(1.05);
}


.linkedin-outline {
  background-color: white;
  color: rgb(10,102,194);
  padding: 10px 20px;
  border: 1px solid rgb(10,102,194);
  border-radius: 20px;
}
.linkedin-outline:hover {
  background-color: rgb(10,102,194);
  color: white;
}
</style>


</body>
</html>
